<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Slip</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      max-width: 420px;
      margin: 30px auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      height: 50px;
    }

    .status {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: green;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
    }

    .label {
      color: #777;
    }

    .value {
      font-weight: bold;
      color: #111;
    }

    hr {
      margin: 15px 0;
      border: none;
      border-top: 1px solid #ddd;
    }

    .weights {
      margin-top: 10px;
    }

    .weights .row {
      font-size: 16px;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
  </div>

  <!-- STATUS -->
  <div class="status">✅ VERIFIED</div>

  <!-- DETAILS -->
  <div class="row"><span class="label">Serial</span><span class="value" id="serial">-</span></div>
  <div class="row"><span class="label">Vehicle</span><span class="value" id="vehicle">-</span></div>
  <div class="row"><span class="label">Party</span><span class="value" id="party">-</span></div>
  <div class="row"><span class="label">Broker</span><span class="value" id="broker">-</span></div>
  <div class="row"><span class="label">Material</span><span class="value" id="material">-</span></div>

  <hr/>

  <!-- WEIGHTS -->
  <div class="weights">
    <div class="row"><span class="label">Gross</span><span class="value" id="gross">-</span></div>
    <div class="row"><span class="label">Tare</span><span class="value" id="tare">-</span></div>
    <div class="row"><span class="label">Net</span><span class="value" id="net">-</span></div>
  </div>

  <hr/>

  <!-- DATE -->
  <div class="row"><span class="label">Date</span><span class="value" id="date">-</span></div>

  <div class="footer">
    K.M Agro Udyog LLP
  </div>

</div>

<!-- SCRIPT (VERY IMPORTANT) -->
<script>
const params = new URLSearchParams(window.location.search);

function set(id, value) {
  document.getElementById(id).innerText = value || "-";
}

set("serial", params.get("serial"));
set("vehicle", params.get("vehicle"));
set("party", params.get("party"));
set("broker", params.get("broker"));
set("material", params.get("material"));
set("gross", params.get("gross"));
set("tare", params.get("tare"));
set("net", params.get("net"));
set("date", params.get("date"));
</script>

</body>
</html>
