<!DOCTYPE html>
<html>
<head>
  <title>KM Agro Verification</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial;
    }

    .card {
      width: 90%;
      max-width: 400px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .verified {
      text-align: center;
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
    }

    hr {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div id="content"></div>

<script>
const content = document.getElementById("content");

function render(data) {
  content.innerHTML = `
    <div class="card">
      <div class="verified">✔ VERIFIED</div>

      <div class="row"><b>Serial</b><span>${data.s || '-'}</span></div>
      <div class="row"><b>Vehicle</b><span>${data.v || '-'}</span></div>
      <div class="row"><b>Party</b><span>${data.p || '-'}</span></div>
      <div class="row"><b>Broker</b><span>${data.b || '-'}</span></div>
      <div class="row"><b>Material</b><span>${data.m || '-'}</span></div>

      <hr>

      <div class="row"><b>Gross</b><span>${data.g || '-'}</span></div>
      <div class="row"><b>Tare</b><span>${data.t || '-'}</span></div>
      <div class="row"><b>Net</b><span>${data.n || '-'}</span></div>
      <div class="row"><b>Date</b><span>${data.ts || '-'}</span></div>
    </div>
  `;
}

try {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("t");

  if (token) {
    const SECRET_KEY = "KMAGRO_AES_SECRET_32CHARSLONG_KEY";
    const bytes = CryptoJS.AES.decrypt(token, SECRET_KEY);
    const decrypted = bytes.toString(CryptoJS.enc.Utf8);

    if (!decrypted) throw new Error();

    const data = JSON.parse(decrypted);
    render(data);

  } else {
    const data = {
      s: params.get("serial"),
      v: params.get("vehicle"),
      p: params.get("party"),
      b: params.get("broker"),
      m: params.get("material"),
      g: params.get("gross"),
      t: params.get("tare"),
      n: params.get("net"),
      ts: params.get("date")
    };

    render(data);
  }

} catch (err) {
  content.innerHTML = `
    <div class="card">
      <div style="color:red;text-align:center;">❌ INVALID QR</div>
    </div>
  `;
}
</script>

</body>
</html>
