<!DOCTYPE html>
<html>
<head>
  <title>KM Agro Verification</title>

  <!-- CryptoJS REQUIRED -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>
  <div id="content">
    <h2>Verifying...</h2>
  </div>

  <script>
    const content = document.getElementById("content");

    try {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("t");

      if (!token) {
        content.innerHTML = "<h3>No data found</h3>";
      } else {
        const SECRET_KEY = "KMAGRO_AES_SECRET_32CHARSLONG_KEY";

        const bytes = CryptoJS.AES.decrypt(decodeURIComponent(token), SECRET_KEY);
        const decrypted = bytes.toString(CryptoJS.enc.Utf8);

        if (!decrypted) {
          throw new Error("Decryption failed");
        }

        const data = JSON.parse(decrypted);

        content.innerHTML = `
          <div style="padding:20px; font-family:Arial;">
            <h3 style="color:green;">✔ VERIFIED</h3>
            <div><b>Serial:</b> ${data.s}</div>
            <div><b>Vehicle:</b> ${data.v}</div>
            <div><b>Gross:</b> ${data.g}</div>
            <div><b>Tare:</b> ${data.t}</div>
            <div><b>Net:</b> ${data.n}</div>
            <div><b>Date:</b> ${data.ts}</div>
          </div>
        `;
      }
    } catch (err) {
      console.error(err);
      content.innerHTML = `
        <div style="padding:20px; font-family:Arial;">
          <h3 style="color:red;">❌ INVALID QR</h3>
          <p>${err.message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
