<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify Slip</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      height: 50px;
    }

    .verified {
      text-align: center;
      color: green;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 16px;
    }

    .label {
      font-weight: bold;
      color: #444;
    }

    .value {
      color: #111;
    }

    hr {
      margin: 15px 0;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">
      <!-- OPTIONAL: Replace with your logo -->
      <img src="logo.png" alt="Logo">
    </div>

    <div class="verified">✅ VERIFIED</div>

    <div class="row"><div class="label">Serial</div><div class="value" id="serial"></div></div>
    <div class="row"><div class="label">Vehicle</div><div class="value" id="vehicle"></div></div>
    <div class="row"><div class="label">Party</div><div class="value" id="party"></div></div>
    <div class="row"><div class="label">Broker</div><div class="value" id="broker"></div></div>
    <div class="row"><div class="label">Material</div><div class="value" id="material"></div></div>

    <hr>

    <div class="row"><div class="label">Gross</div><div class="value" id="gross"></div></div>
    <div class="row"><div class="label">Tare</div><div class="value" id="tare"></div></div>
    <div class="row"><div class="label">Net</div><div class="value" id="net"></div></div>
    <div class="row"><div class="label">Date</div><div class="value" id="date"></div></div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    function set(id, key) {
      const val = params.get(key);
      document.getElementById(id).innerText =
        val ? decodeURIComponent(val) : "-";
    }

    set("serial", "serial");
    set("vehicle", "vehicle");
    set("party", "party");
    set("broker", "broker");
    set("material", "material");
    set("gross", "gross");
    set("tare", "tare");
    set("net", "net");
    set("date", "date");
  </script>

</body>
</html>
