<script>
const content = document.getElementById("content");

function render(data) {
  content.innerHTML = `
    <div style="max-width:400px;margin:50px auto;padding:20px;
    background:white;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);
    font-family:Arial;">

      <h3 style="color:green;text-align:center;">✔ VERIFIED</h3>

      <div><b>Serial:</b> ${data.s || '-'}</div>
      <div><b>Vehicle:</b> ${data.v || '-'}</div>

      <div><b>Party:</b> ${data.p || '-'}</div>
      <div><b>Broker:</b> ${data.b || '-'}</div>
      <div><b>Material:</b> ${data.m || '-'}</div>

      <hr>

      <div><b>Gross:</b> ${data.g || '-'}</div>
      <div><b>Tare:</b> ${data.t || '-'}</div>
      <div><b>Net:</b> ${data.n || '-'}</div>
      <div><b>Date:</b> ${data.ts || '-'}</div>
    </div>
  `;
}

try {
  const params = new URLSearchParams(window.location.search);

  const token = params.get("t");

  if (token) {
    // 🔒 TOKEN FLOW
    const SECRET_KEY = "KMAGRO_AES_SECRET_32CHARSLONG_KEY";
    const bytes = CryptoJS.AES.decrypt(token, SECRET_KEY);
    const decrypted = bytes.toString(CryptoJS.enc.Utf8);

    if (!decrypted) throw new Error("Invalid QR");

    const data = JSON.parse(decrypted);
    render(data);

  } else {
    // 🟢 NORMAL PARAM FLOW (OLD QR)
    const data = {
      s: params.get("serial"),
      v: params.get("vehicle"),
      p: params.get("party"),
      b: params.get("broker"),
      m: params.get("material"),
      g: params.get("gross"),
      t: params.get("tare"),
      n: params.get("net"),
      ts: params.get("date")
    };

    render(data);
  }

} catch (err) {
  content.innerHTML = `
    <div style="padding:20px;font-family:Arial;">
      <h3 style="color:red;">❌ INVALID QR</h3>
    </div>
  `;
}
</script>
