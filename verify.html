<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM Agro Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* Card */
.container {
  max-width: 420px;
  margin: 20px auto;
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 10px;
}
.logo img {
  height: 40px;
}

/* Status */
.status {
  text-align: center;
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 15px;
}

.verified {
  color: green;
}

.invalid {
  color: red;
}

/* Rows */
.row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

.label {
  color: #777;
  font-size: 14px;
}

.value {
  font-weight: bold;
  text-align: right;
}

/* Divider */
.divider {
  border-top: 1px solid #ddd;
  margin: 12px 0;
}

/* Weight highlight */
.weight {
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <!-- Replace with your logo URL -->
    <img src="https://via.placeholder.com/100x40?text=KM+AGRO" alt="Logo">
  </div>

  <!-- STATUS -->
  <div id="status" class="status verified">✅ VERIFIED</div>

  <!-- DETAILS -->
  <div class="row"><div class="label">Serial</div><div class="value" id="serial">-</div></div>
  <div class="row"><div class="label">Vehicle</div><div class="value" id="vehicle">-</div></div>
  <div class="row"><div class="label">Party</div><div class="value" id="party">-</div></div>
  <div class="row"><div class="label">Broker</div><div class="value" id="broker">-</div></div>
  <div class="row"><div class="label">Material</div><div class="value" id="material">-</div></div>

  <div class="divider"></div>

  <!-- WEIGHT -->
  <div class="row weight"><div class="label">Gross</div><div class="value" id="gross">-</div></div>
