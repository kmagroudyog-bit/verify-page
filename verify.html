<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify Slip</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      height: 50px;
    }

    .verified {
      text-align: center;
      color: green;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 16px;
    }

    hr {
      margin: 15px 0;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="logo.png" alt="Logo">
  </div>

  <div class="verified">✅ VERIFIED</div>

  <div class="row"><b>Serial</b> <span id="serial"></span></div>
  <div class="row"><b>Vehicle</b> <span id="vehicle"></span></div>
  <div class="row"><b>Party</b> <span id="party"></span></div>
  <div class="row"><b>Broker</b> <span id="broker"></span></div>
  <div class="row"><b>Material</b> <span id="material"></span></div>

  <hr>

  <div class="row"><b>Gross</b> <span id="gross"></span></div>
  <div class="row"><b>Tare</b> <span id="tare"></span></div>
  <div class="row"><b>Net</b> <span id="net"></span></div>
  <div class="row"><b>Date</b> <span id="date"></span></div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);

  function set(id, key) {
    const val = params.get(key);
    document.getElementById(id).innerText = val ? decodeURIComponent(val) : "-";
  }

  set("serial", "serial");
  set("vehicle", "vehicle");
  set("party", "party");
  set("broker", "broker");
